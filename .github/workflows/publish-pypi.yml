name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.testpypi == 'true' && 'testpypi' || 'pypi' }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="$(python - <<'PY'
          import pathlib
          import re
          text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, re.M)
          if not match:
              raise SystemExit("version not found in pyproject.toml")
          print(match.group(1))
          PY
          )"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != pyproject.toml version ($PYPROJECT_VERSION)"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Check distributions
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        if: github.event_name == 'push' || inputs.testpypi == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.testpypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
